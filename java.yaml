name: Java-Workflow

on:
  push:
    branches:
      - main

jobs:
  build:  # This was missing (Job ID)
    name: my-spc
    runs-on: self-hosted  # Fixed typo and simplified label
    
    steps:
      - name: git-checkout
        uses: actions/checkout@v4

      - name: Build java with maven
        run: mvn package  # Standard maven command
